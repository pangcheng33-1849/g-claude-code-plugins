# feishu-channel-sandbox: DEFAULT profile — allowed bash command prefixes
# Read-only commands only. All commands are constrained by sandbox.conf path whitelist.
# Switch profiles: /feishu-channel-sandbox-profile dev

# Common safe commands
ls
cat
head
tail
wc
echo
printf
date
pwd
whoami
which
file
stat
du
df
find
sort
uniq
grep
rg
ag
sed
awk
cut
tr
diff
jq
yq

# Version/info commands
git status
git log
git diff
git show
git branch
node --version
python3 --version
bun --version

# Package info (read-only)
npm list
npm info
pip list
pip show

# Profile management (used by /feishu-channel-sandbox-profile skill)
ln -sf ~/.claude/channels/feishu/
readlink
cp ~/.claude/channels/feishu/profiles/
rm ~/.claude/channels/feishu/profiles/

# Process info
ps
top -l 1
